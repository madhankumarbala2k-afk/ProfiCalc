<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – ProfiCalc</title>
  <meta name="description" content="Create a ProfiCalc account to manage your shop's profits and inventory." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Auth page overrides ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,.18) 0%, transparent 70%);
      top: -120px; right: -120px;
      border-radius: 50%;
      animation: floatOrb 9s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,195,247,.14) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      border-radius: 50%;
      animation: floatOrb 11s ease-in-out infinite alternate-reverse;
      pointer-events: none;
    }

    @keyframes floatOrb {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 30px) scale(1.08); }
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 10;
      animation: slideUp .5s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .auth-brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 900; color: #fff;
      box-shadow: 0 8px 24px rgba(108,99,255,.4);
    }

    .auth-brand-text .brand-name {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .auth-brand-text .brand-sub {
      font-size: .72rem; color: var(--muted); margin-top: 2px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      backdrop-filter: blur(10px);
    }

    .auth-title {
      font-size: 1.6rem; font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .auth-form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
    }

    .auth-label {
      font-size: .8rem; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .auth-input-wrap { position: relative; }

    .auth-input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      color: var(--muted);
    }

    .auth-input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px 12px 42px;
      font-size: .95rem;
      font-family: inherit;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.22);
    }

    .auth-input.valid   { border-color: var(--green); }
    .auth-input.invalid { border-color: var(--red); }

    .auth-input::placeholder { color: var(--muted); }

    .field-hint {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3px;
      min-height: 18px;
      transition: color .2s;
    }

    .field-hint.error { color: var(--red); }
    .field-hint.ok    { color: var(--green); }

    /* Password strength bar */
    .strength-bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .35s, background .35s;
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #5b52e0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 6px 20px rgba(108,99,255,.45);
      transition: transform .2s, box-shadow .2s;
      letter-spacing: .02em;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(108,99,255,.55);
    }

    .auth-btn:active { transform: translateY(0); }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: .8rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-link-row {
      text-align: center;
      font-size: .875rem;
      color: var(--muted);
      margin-top: 20px;
    }

    .auth-link-row a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }

    .auth-link-row a:hover { color: #fff; text-decoration: underline; }

    /* Success banner */
    .auth-success {
      display: none;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.35);
      color: var(--green);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 18px;
      align-items: center;
      gap: 8px;
    }
    .auth-success.show { display: flex; }

    /* Error banner */
    .auth-error {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      color: var(--red);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 18px;
      align-items: center;
      gap: 8px;
    }
    .auth-error.show { display: flex; }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .9rem;
      padding: 2px;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-icon">₹</div>
      <div class="auth-brand-text">
        <div class="brand-name">ProfiCalc</div>
        <div class="brand-sub">Smart Shop Manager</div>
      </div>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <h1 class="auth-title">Create account ✨</h1>
      <p class="auth-subtitle">Set up your free ProfiCalc account</p>

      <div class="auth-success" id="signup-success">
        <span>✅</span><span>Account created! Redirecting to login…</span>
      </div>
      <div class="auth-error" id="signup-error">
        <span>⚠️</span><span id="signup-error-text"></span>
      </div>

      <form id="signup-form" onsubmit="handleSignup(event)" novalidate>

        <!-- Username -->
        <div class="auth-form-group">
          <label class="auth-label" for="signup-username">Username</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">👤</span>
            <input
              type="text"
              id="signup-username"
              class="auth-input"
              placeholder="Choose a username"
              autocomplete="username"
              oninput="validateUsername()"
              required
            />
          </div>
          <div class="field-hint" id="hint-username">At least 3 characters, no spaces</div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
          <label class="auth-label" for="signup-password">Password</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔒</span>
            <input
              type="password"
              id="signup-password"
              class="auth-input"
              placeholder="Create a strong password"
              autocomplete="new-password"
              oninput="validatePassword()"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw1" onclick="togglePassword('signup-password','toggle-pw1')" title="Show/Hide password">👁️</button>
          </div>
          <div class="strength-bar-wrap">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <div class="field-hint" id="hint-password">Min. 6 characters</div>
        </div>

        <!-- Confirm Password -->
        <div class="auth-form-group">
          <label class="auth-label" for="signup-confirm">Confirm Password</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔑</span>
            <input
              type="password"
              id="signup-confirm"
              class="auth-input"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              oninput="validateConfirm()"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw2" onclick="togglePassword('signup-confirm','toggle-pw2')" title="Show/Hide password">👁️</button>
          </div>
          <div class="field-hint" id="hint-confirm">Both passwords must match</div>
        </div>

        <button type="submit" class="auth-btn" id="signup-btn">🚀 Create Account</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-link-row">
        Already have an account?
        <a href="login.html" id="go-login">Login</a>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    (function() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = 'index.html';
      }
    })();

    /* ── Validation helpers ── */
    function validateUsername() {
      const input = document.getElementById('signup-username');
      const hint  = document.getElementById('hint-username');
      const val   = input.value.trim();

      if (val.length === 0) {
        input.className = 'auth-input';
        hint.className  = 'field-hint';
        hint.textContent = 'At least 3 characters, no spaces';
        return false;
      }
      if (val.length < 3 || /\s/.test(val)) {
        input.className = 'auth-input invalid';
        hint.className  = 'field-hint error';
        hint.textContent = val.length < 3 ? 'Username too short (min 3 chars)' : 'No spaces allowed';
        return false;
      }
      input.className = 'auth-input valid';
      hint.className  = 'field-hint ok';
      hint.textContent = '✓ Username looks good';
      return true;
    }

    function validatePassword() {
      const input = document.getElementById('signup-password');
      const hint  = document.getElementById('hint-password');
      const bar   = document.getElementById('strength-bar');
      const pw    = input.value;

      if (pw.length === 0) {
        input.className = 'auth-input';
        hint.className  = 'field-hint';
        hint.textContent = 'Min. 6 characters';
        bar.style.width = '0%';
        return false;
      }

      let score = 0;
      if (pw.length >= 6)  score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
      const colors = ['', '#ef4444', '#f59e0b', '#eab308', '#22c55e', '#6c63ff'];
      const pcts   = ['0%', '20%', '40%', '60%', '80%', '100%'];

      bar.style.width      = pcts[score];
      bar.style.background = colors[score];

      if (pw.length < 6) {
        input.className = 'auth-input invalid';
        hint.className  = 'field-hint error';
        hint.textContent = 'Too short – min 6 characters';
        return false;
      }

      input.className = 'auth-input valid';
      hint.className  = score >= 3 ? 'field-hint ok' : 'field-hint';
      hint.textContent = 'Strength: ' + (labels[score] || 'Weak');
      validateConfirm(); // re-check confirm if already typed
      return true;
    }

    function validateConfirm() {
      const pw      = document.getElementById('signup-password').value;
      const input   = document.getElementById('signup-confirm');
      const hint    = document.getElementById('hint-confirm');
      const val     = input.value;

      if (val.length === 0) {
        input.className = 'auth-input';
        hint.className  = 'field-hint';
        hint.textContent = 'Both passwords must match';
        return false;
      }
      if (val !== pw) {
        input.className = 'auth-input invalid';
        hint.className  = 'field-hint error';
        hint.textContent = '✗ Passwords do not match';
        return false;
      }
      input.className = 'auth-input valid';
      hint.className  = 'field-hint ok';
      hint.textContent = '✓ Passwords match';
      return true;
    }

    function handleSignup(e) {
      e.preventDefault();
      hideError();

      const okU = validateUsername();
      const okP = validatePassword();
      const okC = validateConfirm();

      if (!okU || !okP || !okC) return;

      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value;

      // Save to localStorage
      const userData = { username, password };
      localStorage.setItem('user', JSON.stringify(userData));

      // Show success
      document.getElementById('signup-success').classList.add('show');
      document.getElementById('signup-btn').disabled = true;
      document.getElementById('signup-btn').textContent = '✅ Account Created!';

      // Redirect after short delay
      setTimeout(() => { window.location.href = 'login.html'; }, 1600);
    }

    function hideError() {
      document.getElementById('signup-error').classList.remove('show');
    }

    function togglePassword(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }
  </script>
</body>
</html>
